<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리딩 결과 - 타로다요</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=6)}">
</head>
<body>
<div class="page-wrap">
    <div class="step-indicator">
        <div class="step-item completed">
            <div class="step-circle">✓</div>
            <div class="step-label">사연 입력</div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item completed">
            <div class="step-circle">✓</div>
            <div class="step-label">카드 선택</div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item active">
            <div class="step-circle">3</div>
            <div class="step-label">결과 확인</div>
        </div>
    </div>

    <div class="result-container">
        <h2 class="result-title" th:text="${spreadType == 'today' ? '🌟 오늘의 카드' : '✨ 타로 리딩 결과'}">✨ 타로 리딩 결과</h2>
        <p class="result-question">"<span id="resultQuestion" th:text="${result.question}"></span>"</p>

        <div class="result-cards">
            <div th:each="card, stat : ${result.selectedCards}" class="result-card-slot">
                <div class="position-label" th:text="${spreadType == 'today' ? '오늘' : (stat.index == 0 ? '과거' : stat.index == 1 ? '현재' : '미래')}"></div>
                <div class="result-card" th:classappend="${card.reversed} ? 'reversed' : ''">
                    <img th:src="@{|/images/tarot/${card.card.cardNumber}.jpg|}"
                         th:alt="${card.card.nameKo}"
                         th:classappend="${card.reversed} ? 'card-img reversed-img' : 'card-img'"
                         th:data-id="${card.card.id}"
                         onerror="this.onerror=null;this.src='/card-image/'+this.dataset.id"/>
                    <div class="result-card-direction" th:text="${card.direction}"></div>
                    <div class="result-keywords" th:text="${card.keywords}"></div>
                </div>
            </div>
        </div>

        <div class="interpretation-box">
            <h3>🔮 AI 해석</h3>
            <div class="interpretation-text" th:text="${result.interpretation}"></div>
        </div>

        <div class="result-actions">
            <button type="button" id="copyBtn" class="btn-copy" onclick="copyReading()">결과 복사하기 📋</button>
            <a href="/" class="btn-again">다시 뽑기</a>
        </div>
    </div>
</div>
<script src="/js/result.js"></script>
</body>
</html>
