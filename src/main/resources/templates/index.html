<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로다요 - AI 타로 리딩</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=5)}">
</head>
<body>
<div class="page-wrap">
    <div class="step-indicator">
        <div class="step-item active">
            <div class="step-circle">1</div>
            <div class="step-label">사연 입력</div>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">2</div>
            <div class="step-label">카드 선택</div>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">3</div>
            <div class="step-label">결과 확인</div>
        </div>
    </div>

    <div class="main-container">
        <div class="hero">
            <h1 class="title">🔮 타로다요</h1>
            <p class="subtitle">AI가 카드에 담긴 당신의 이야기를 읽어드립니다</p>

            <form action="/draw" method="post" class="question-form">
                <div class="spread-select">
                    <label class="spread-option">
                        <input type="radio" name="spreadType" value="three" checked>
                        <span class="spread-label">
                            <strong>🕰 과거·현재·미래</strong>
                            <small>3장으로<br>시간의 흐름을 읽습니다</small>
                        </span>
                    </label>
                    <label class="spread-option">
                        <input type="radio" name="spreadType" value="today">
                        <span class="spread-label">
                            <strong>🌟 오늘의 카드</strong>
                            <small>1장으로<br>오늘의 에너지를 읽습니다</small>
                        </span>
                    </label>
                </div>
                <div class="input-group">
                    <label for="question">오늘 어떤 것이 궁금한가요?</label>
                    <textarea id="question" name="question"
                              placeholder="예: 지금 하는 일이 잘 될까요? / 새로운 사람과의 관계는 어떻게 될까요?"
                              required maxlength="200"></textarea>
                </div>
                <button type="submit" class="btn-start">카드 뽑기 ✨</button>
            </form>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
