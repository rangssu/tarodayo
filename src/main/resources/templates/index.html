<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로다요 - AI 타로 리딩</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-container">
    <div class="hero">
        <div class="stars"></div>
        <h1 class="title">🔮 타로다요</h1>
        <p class="subtitle">AI가 카드에 담긴 당신의 이야기를 읽어드립니다</p>

        <form action="/draw" method="post" class="question-form">
            <div class="input-group">
                <label for="question">오늘 어떤 것이 궁금한가요?</label>
                <textarea id="question" name="question"
                          placeholder="예: 지금 하는 일이 잘 될까요? / 새로운 사람과의 관계는 어떻게 될까요?"
                          required maxlength="200"></textarea>
            </div>
            <button type="submit" class="btn-start">카드 뽑기 ✨</button>
        </form>
    </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
