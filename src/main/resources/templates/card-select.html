<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 선택 - 타로다요</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=6)}">
</head>
<body>
<div class="page-wrap">
    <div class="step-indicator">
        <div class="step-item completed">
            <div class="step-circle">✓</div>
            <div class="step-label">사연 입력</div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item active">
            <div class="step-circle">2</div>
            <div class="step-label">카드 선택</div>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">3</div>
            <div class="step-label">결과 확인</div>
        </div>
    </div>

    <div class="select-container">
        <h2 class="select-title" th:text="${maxSelect == 1 ? '🌟 오늘의 카드를 고르세요' : '🌙 카드를 선택하세요'}">🌙 카드를 선택하세요</h2>
        <p class="select-subtitle">"<span th:text="${question}"></span>"</p>
        <p class="select-guide">5장 중 <strong th:text="${maxSelect}+'장'">3장</strong>을 골라주세요</p>
        <div class="selected-count">선택됨: <span id="count">0</span> / <span th:text="${maxSelect}">3</span></div>

        <form id="selectForm" action="/result" method="post">
            <div class="cards-area" th:data-max-select="${maxSelect}" th:data-spread-type="${spreadType}">
                <div th:each="card, stat : ${drawnCards}"
                     class="card-slot"
                     th:data-index="${stat.index}"
                     onclick="selectCard(this, event)">
                    <div class="card-inner">
                        <div class="card-back">
                            <div class="card-back-ornament">✦</div>
                            <div class="card-back-border"></div>
                        </div>
                        <div class="card-front">
                            <div class="card-position-label"></div>
                            <img th:src="@{|/images/tarot/${card.card.cardNumber}.jpg|}"
                                 th:alt="${card.card.nameKo}" class="card-img"
                                 th:data-id="${card.card.id}"
                                 onerror="this.onerror=null;this.src='/card-image/'+this.dataset.id"/>
                            <div class="card-direction-badge" th:classappend="${card.reversed} ? 'reversed' : ''"
                                 th:text="${card.direction}"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="confirm-area">
                <button type="button" id="confirmBtn" class="btn-confirm" onclick="submitForm()">
                    운명을 확인하기 ✨
                </button>
            </div>
        </form>
    </div>
</div>
<script th:inline="javascript">
    window._taroConfig = {
        maxSelect: /*[[${maxSelect}]]*/ 3,
        spreadType: /*[[${spreadType}]]*/ 'three'
    };
</script>
<script src="/js/card-select.js"></script>
</body>
</html>
